{% extends 'base.html' %}
{% block title %}Nueva Compra - InventarioWeb{% endblock %}
{% block content %}
<div class="row mb-3">
    <div class="col-12">
        <a href="{% url 'proveedores:compras_list' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Volver</a>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-white">
                <h4 class="mb-0"><i class="bi bi-cart-check"></i> Iniciar Nueva Compra</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.non_field_errors }}
                    <div class="mb-3">
                        <label class="form-label">Seleccione el Proveedor:</label>
                        {{ form.proveedor }}
                    </div>
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-arrow-right"></i> Continuar Agregando Productos</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        let inputs = document.querySelectorAll("select");
        inputs.forEach(input => {
            input.classList.add('form-select');
        });
    });
</script>
{% endblock %}
